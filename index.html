<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT is Rounds Complete - Retirement Nexus</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #05070a; 
            --bg-surface: rgba(16, 20, 25, 0.9);
            --accent-green: #74C365; 
            --accent-glow: rgba(116, 195, 101, 0.4);
            --text-main: #e0e0e0;
            --text-dim: #7a838d;
            --font-tech: 'Orbitron', sans-serif;
            --font-clean: 'Rajdhani', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-clean);
            background: 
                radial-gradient(circle at center, #0d121a 0%, #05070a 100%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0Ni4xODgiIHZpZXdCb3g9IjAgMCA0MCA0Ni4xODgiPjxwYXRoIGQ9Ik0yMCAwbDIwIDExLjU0NnYyMy4wOTJMMjAgNDYuMTg4IDAgMzQuNjM4di0yMy4wOTJMMjAgMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzc0QzM2NSIgc3Ryb2tlLW9wYWNpdHk9IjAuMDMiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            min-height: 100vh;
            display: flex;
            justify-content: center; /* Centers container on wide screens */
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 40px 15px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Crucial for centering children */
        }

        header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center; /* Force centers the H1 and Subtitle */
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            width: 100%;
            font-family: var(--font-tech);
            font-size: clamp(1.6rem, 8vw, 2.8rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 0 0 12px var(--accent-glow);
            line-height: 1.2;
        }

        .subtitle {
            width: 100%;
            font-family: var(--font-tech);
            font-size: clamp(0.7rem, 3vw, 0.85rem);
            letter-spacing: 4px;
            color: var(--accent-green);
            text-transform: uppercase;
            margin-top: 10px;
        }

        #counter-grid {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .counter-card {
            background: var(--bg-surface);
            border: 1px solid rgba(116, 195, 101, 0.1);
            border-left: 4px solid var(--accent-green);
            padding: 25px;
            border-radius: 4px;
            backdrop-filter: blur(12px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 15px;
        }

        @media (max-width: 480px) {
            .card-meta {
                flex-direction: column;
                align-items: stretch; /* Makes input full width on mobile */
                text-align: center;
            }
        }

        .label {
            font-family: var(--font-tech);
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .date-input {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent-green);
            font-family: var(--font-clean);
            font-weight: 600;
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            text-align: center;
        }

        .display-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        @media (max-width: 550px) {
            .display-row {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
        }

        .segment {
            text-align: center;
            background: rgba(255,255,255,0.02);
            padding: 12px 5px;
            border-radius: 4px;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .value {
            font-family: var(--font-tech);
            font-size: clamp(1.8rem, 10vw, 3.2rem);
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: 0 0 10px var(--accent-glow);
            line-height: 1;
        }

        .unit {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-top: 6px;
        }

        .btn-add {
            margin-top: 30px;
            width: 100%;
            padding: 18px;
            background: transparent;
            border: 1px solid rgba(116, 195, 101, 0.2);
            color: var(--text-dim);
            font-family: var(--font-tech);
            font-size: 0.7rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
        }

        .btn-add:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .btn-add:active {
            background: var(--accent-glow);
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>JT is Rounds Complete</h1>
            <div class="subtitle">Countdown to Retirement</div>
        </header>

        <div id="counter-grid"></div>

        <button class="btn-add" onclick="addNewCounter()">+ Add Operational Phase</button>
    </div>

    <script>
        const initialStates = [
            { id: 2, label: "T-Minus Transition", date: "2026-09-30T17:00" },
            { id: 1, label: "T-Minus Deployment", date: "2027-03-31T17:00" }
        ];

        let counters = [];

        function init() {
            initialStates.forEach(s => createCard(s));
            setInterval(updateAll, 1000);
            updateAll();
        }

        function createCard(config) {
            const grid = document.getElementById('counter-grid');
            const card = document.createElement('div');
            card.className = 'counter-card';
            card.id = `card-${config.id}`;
            
            card.innerHTML = `
                <div class="card-meta">
                    <span class="label">${config.label}</span>
                    <input type="datetime-local" class="date-input" value="${config.date}" 
                           onchange="updateDate(${config.id}, this.value)">
                </div>
                <div class="display-row">
                    <div class="segment"><div class="value" id="d-${config.id}">00</div><div class="unit">Days</div></div>
                    <div class="segment"><div class="value" id="h-${config.id}">00</div><div class="unit">Hrs</div></div>
                    <div class="segment"><div class="value" id="m-${config.id}">00</div><div class="unit">Min</div></div>
                    <div class="segment"><div class="value" id="s-${config.id}">00</div><div class="unit">Sec</div></div>
                </div>
            `;
            grid.appendChild(card);
            counters.push({ id: config.id, target: new Date(config.date).getTime() });
        }

        function updateDate(id, val) {
            const c = counters.find(i => i.id === id);
            if (c) c.target = new Date(val).getTime();
        }

        function addNewCounter() {
            const newId = Date.now();
            createCard({ id: newId, label: "Custom Phase", date: "2026-12-31T23:59" });
        }

        function updateAll() {
            const now = new Date().getTime();
            counters.forEach(c => {
                const diff = c.target - now;
                const d = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
                const h = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
                const m = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
                const s = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));

                const updateEl = (type, val) => {
                    const el = document.getElementById(`${type}-${c.id}`);
                    if(el) el.innerText = val.toString().padStart(2, '0');
                };

                updateEl('d', d); updateEl('h', h); updateEl('m', m); updateEl('s', s);
            });
        }

        window.onload = init;
    </script>
</body>
</html>
