<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JT is Rounds Complete - Retirement Nexus</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #05070a; 
            --bg-surface: rgba(16, 20, 25, 0.85);
            /* Tactical Sage Green - Muted but Luminescent */
            --accent-green: #74C365; 
            --accent-glow: rgba(116, 195, 101, 0.4);
            --text-main: #e0e0e0;
            --text-dim: #7a838d;
            --font-tech: 'Orbitron', sans-serif;
            --font-clean: 'Rajdhani', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: var(--font-clean);
            /* Refined Background: Gradient + Faded Hex */
            background: 
                radial-gradient(circle at center, #0d121a 0%, #05070a 100%),
                url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0MCIgaGVpZ2h0PSI0Ni4xODgiIHZpZXdCb3g9IjAgMCA0MCA0Ni4xODgiPjxwYXRoIGQ9Ik0yMCAwbDIwIDExLjU0NnYyMy4wOTJMMjAgNDYuMTg4IDAgMzQuNjM4di0yMy4wOTJMMjAgMHoiIGZpbGw9Im5vbmUiIHN0cm9rZT0iIzc0QzM2NSIgc3Ryb2tlLW9wYWNpdHk9IjAuMDMiIHN0cm9rZS13aWR0aD0iMSIvPjwvc3ZnPg==');
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            padding: 60px 20px;
        }

        /* HEADER AREA */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            font-family: var(--font-tech);
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 15px var(--accent-glow);
            margin-bottom: 8px;
        }

        .subtitle {
            font-family: var(--font-tech);
            font-size: 0.9rem;
            letter-spacing: 6px;
            color: var(--accent-green);
            text-transform: uppercase;
            opacity: 0.9;
        }

        /* GRID SYSTEM */
        #counter-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        /* CARD DESIGN */
        .counter-card {
            background: var(--bg-surface);
            border: 1px solid rgba(116, 195, 101, 0.1);
            border-left: 5px solid var(--accent-green);
            padding: 35px;
            border-radius: 4px;
            backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        .counter-card:hover {
            transform: translateX(10px);
            border-color: var(--accent-green);
            background: rgba(22, 27, 34, 0.95);
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            padding-bottom: 12px;
        }

        .label {
            font-family: var(--font-tech);
            font-size: 0.75rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .date-input {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--accent-green);
            font-family: var(--font-clean);
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 3px;
            outline: none;
            transition: all 0.3s;
        }

        .date-input:focus {
            border-color: var(--accent-green);
            background: rgba(0,0,0,0.4);
        }

        /* THE NUMBERS (GLOW) */
        .display-row {
            display: flex;
            justify-content: space-between;
            gap: 10px;
        }

        .segment {
            flex: 1;
            text-align: center;
        }

        .value {
            font-family: var(--font-tech);
            font-size: clamp(2.2rem, 7vw, 4rem);
            font-weight: 700;
            line-height: 1;
            color: var(--accent-green);
            text-shadow: 0 0 12px var(--accent-glow);
        }

        .unit {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 8px;
            color: var(--text-dim);
            font-weight: 500;
        }

        /* ACTION BUTTON */
        .btn-add {
            margin-top: 30px;
            width: 100%;
            padding: 15px;
            background: transparent;
            border: 1px solid rgba(116, 195, 101, 0.2);
            color: var(--text-dim);
            font-family: var(--font-tech);
            font-size: 0.75rem;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .btn-add:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            background: rgba(116, 195, 101, 0.05);
        }

        /* RESPONSIVE */
        @media (max-width: 600px) {
            .display-row { flex-wrap: wrap; }
            .segment { min-width: 45%; margin-bottom: 15px; }
            .value { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>JT is Rounds Complete</h1>
            <div class="subtitle">Countdown to Retirement</div>
        </header>

        <div id="counter-grid">
            </div>

        <button class="btn-add" onclick="addNewCounter()">+ Initialize Custom Phase</button>
    </div>

    <script>
        // Order updated: Transition (Interim) on top, Deployment (Final) second.
        const initialStates = [
            { id: 2, label: "T-Minus Transition (Phase 1)", date: "2026-09-30T17:00" },
            { id: 1, label: "T-Minus Deployment (Final)", date: "2027-03-31T17:00" }
        ];

        let counters = [];

        function init() {
            initialStates.forEach(s => createCard(s));
            setInterval(updateAll, 1000);
        }

        function createCard(config) {
            const grid = document.getElementById('counter-grid');
            
            const card = document.createElement('div');
            card.className = 'counter-card';
            card.id = `card-${config.id}`;
            
            card.innerHTML = `
                <div class="card-meta">
                    <span class="label">${config.label}</span>
                    <input type="datetime-local" class="date-input" value="${config.date}" 
                           onchange="updateDate(${config.id}, this.value)">
                </div>
                <div class="display-row">
                    <div class="segment"><div class="value" id="d-${config.id}">00</div><div class="unit">Days</div></div>
                    <div class="segment"><div class="value" id="h-${config.id}">00</div><div class="unit">Hrs</div></div>
                    <div class="segment"><div class="value" id="m-${config.id}">00</div><div class="unit">Min</div></div>
                    <div class="segment"><div class="value" id="s-${config.id}">00</div><div class="unit">Sec</div></div>
                </div>
            `;
            
            grid.appendChild(card);
            counters.push({ id: config.id, target: new Date(config.date).getTime() });
        }

        function updateDate(id, val) {
            const c = counters.find(i => i.id === id);
            if (c) {
                c.target = new Date(val).getTime();
                updateAll(); 
            }
        }

        function addNewCounter() {
            const newId = Date.now();
            createCard({ id: newId, label: "Operational Phase", date: "2026-12-31T23:59" });
        }

        function updateAll() {
            const now = new Date().getTime();
            counters.forEach(c => {
                const diff = c.target - now;
                
                const d = Math.max(0, Math.floor(diff / (1000 * 60 * 60 * 24)));
                const h = Math.max(0, Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60)));
                const m = Math.max(0, Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60)));
                const s = Math.max(0, Math.floor((diff % (1000 * 60)) / 1000));

                const dEl = document.getElementById(`d-${c.id}`);
                const hEl = document.getElementById(`h-${c.id}`);
                const mEl = document.getElementById(`m-${c.id}`);
                const sEl = document.getElementById(`s-${c.id}`);

                if(dEl) dEl.innerText = d.toString().padStart(2, '0');
                if(hEl) hEl.innerText = h.toString().padStart(2, '0');
                if(mEl) mEl.innerText = m.toString().padStart(2, '0');
                if(sEl) sEl.innerText = s.toString().padStart(2, '0');
            });
        }

        window.onload = init;
    </script>
</body>
</html>
